<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="Family Timeline">
<title>Family Timeline 2026–27</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f9f8f6;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
}
@media (max-width: 600px) {
  body { padding: 1rem 0.75rem; }
}
.card {
  background: #fff;
  border-radius: 16px;
  border: 0.5px solid rgba(0,0,0,0.1);
  padding: 1.5rem 1.75rem 1.25rem;
  width: 100%;
  max-width: 820px;
}
@media (max-width: 600px) {
  .card { padding: 1rem 1rem 0.875rem; border-radius: 12px; }
}
h1 {
  font-size: 17px;
  font-weight: 500;
  color: #1a1a1a;
  margin-bottom: 1.25rem;
}
@media (max-width: 600px) {
  h1 { font-size: 15px; margin-bottom: 1rem; }
}
.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.nav-btn {
  width: 32px; height: 32px;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #333;
  flex-shrink: 0;
  transition: background 0.15s;
}
@media (max-width: 600px) {
  .nav-btn { width: 36px; height: 36px; }
}
.nav-btn:hover { background: #f0f0f0; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
#winLabel {
  flex: 1;
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  color: #1a1a1a;
}
@media (max-width: 600px) {
  #winLabel { font-size: 13px; }
}
#detPanel {
  display: none;
  margin-top: 10px;
  padding: 10px 14px;
  background: #f5f4f1;
  border-radius: 8px;
}
.det-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.det-meta {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 5px;
}
.det-meta span { font-size: 11px; color: #555; }
.close-btn {
  flex-shrink: 0; width: 22px; height: 22px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: #666;
}
.close-btn:hover { background: rgba(0,0,0,0.07); }
</style>
</head>

ach day before camp. We CANNOT be responsible for applying sunscreen to campers at camp.\nVERY HOT DAYS: We plan on being at our fields on hot days but take extra water breaks and have extended lunch period in the shade. On some occasions we may set up slip and slides or sprinklers for the campers. A small towel is recommended.\nCELL PHONE POLICY: Cell phones are allowed at camp but Kids of Summer is not responsible for them. Campers are only permitted to use them at lunch time or in an emergency.\nSCOOTERS AND BIKES: Can be ridden to and from camp but are NOT allowed to be ridden during camp hours. Kids of Summer is not responsible for bikes or scooters at camp.'}),

de. On some occasions we may set up slip and slides or sprinklers for the campers. A small towel is recommended.\nCELL PHONE POLICY: Cell phones are allowed at camp but Kids of Summer is not responsible for them. Campers are only permitted to use them at lunch time or in an emergency.\nSCOOTERS AND BIKES: Can be ridden to and from camp but are NOT allowed to be ridden during camp hours. Kids of Summer is not responsible for bikes or scooters at camp.'}),

var wi=0;
var prevMob=isMobile();

function isMobile(){return window.innerWidth<=600;}
function getWindows(){return isMobile()?mobileWindows:desktopWindows;}
function dt(a){return new Date(a[0],a[1],a[2]);}

function syncWindowIndex(wasMob){
  var oldW=(wasMob?mobileWindows:desktopWindows)[wi];
  var mid=new Date((oldW.s.getTime()+oldW.e.getTime())/2);
  var nw=wasMob?desktopWindows:mobileWindows;
  for(var i=0;i<nw.length;i++){if(mid>=nw[i].s&&mid<nw[i].e){wi=i;return;}}
  wi=0;
}

function render(){
  var mob=isMobile();
  var LBL=mob?62:100, ROW_H=mob?44:52, AXIS_H=mob?22:26, GAP=2;
  var barFs=mob?'10px':'11px', msFs=mob?'9px':'10px', lblFs=mob?'11px':'12px';
  var barPad=mob?'0 4px':'0 5px', barVert=mob?'5px':'6px', diaS=mob?'5px':'6px';

  var windows=getWindows();
  var w=windows[wi],wS=w.s,wE=w.e,wDays=(wE-wS)/86400000;
  document.getElementById('winLabel').textContent=w.label;
  document.getElementById('btnP').disabled=(wi===0);
  document.getElementById('btnN').disabled=(wi===windows.length-1);

  function off(d){return (d-wS)/86400000;}
  function pp(v){return (v/wDays*100).toFixed(3)+'%';}

  var marks=[],cur=new Date(wS);
  while(cur.getDay()!==1) cur=new Date(cur.getTime()+86400000);
  while(cur<wE){marks.push(new Date(cur));cur=new Date(cur.getTime()+7*86400000);}

  var h='';
  h+='<div style="display:flex;margin-bottom:2px;">';
  h+='<div style="width:'+LBL+'px;flex-shrink:0;"></div>';
  h+='<div style="flex:1;position:relative;height:'+AXIS_H+'px;border-bottom:0.5px solid rgba(0,0,0,0.1);">';
  for(var j=0;j<marks.length;j++){
    var mo=marks[j],ov=off(mo);
    if(ov<0||ov>=wDays) continue;
    h+='<div style="position:absolute;left:'+pp(ov)+';top:0;bottom:0;border-left:0.5px solid rgba(0,0,0,0.08);transform:translateX(-0.5px);">';

    h+='</div>';
  }
  h+='</div></div>';

  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    var vis=row.idx.filter(function(i){return dt(items[i].e)>=wS&&dt(items[i].s)<wE;});
    if(!vis.length) continue;
    h+='<div style="display:flex;margin-bottom:'+GAP+'px;">';
    h+='<div style="width:'+LBL+'px;flex-shrink:0;display:flex;align-items:center;padding-right:6px;"><span style="font-size:'+lblFs+';font-weight:500;color:#666;">'+row.label+'</span></div>';
    h+='<div style="flex:1;position:relative;height:'+ROW_H+'px;">';
    for(var vi=0;vi<vis.length;vi++){
      var i=vis[vi],it=items[i];
      var iso=off(dt(it.s)),ieo=off(dt(it.e));
      if(it.milestone){
        var cx=(iso+ieo+1)/2;
        h+='<div role="button" tabindex="0" onclick="showDetail('+i+')" style="position:absolute;left:'+pp(cx)+';top:0;bottom:0;transform:translateX(-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;z-index:2;">';

        h+='<div style="width:'+diaS+';height:'+diaS+';background:'+it.clr+';transform:rotate(45deg);flex-shrink:0;"></div>';
        h+='</div>';
      } else {
        var eS=Math.max(0,iso),eE=Math.min(wDays,ieo+1);
        if(eE<=eS) continue;
        var border=it.dashed?'1.5px dashed '+it.clr:'1px solid '+it.clr;
        h+='<div role="button" tabindex="0" onclick="showDetail('+i+')" style="position:absolute;left:'+pp(eS)+';width:'+pp(eE-eS)+';top:'+barVert+';bottom:'+barVert+';background:'+it.bg+';border:'+border+';border-radius:4px;display:flex;align-items:center;padding:'+barPad+';cursor:pointer;box-sizing:border-box;overflow:hidden;">';
        h+='<span style="font-size:'+barFs+';font-weight:500;color:'+it.tx+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(it.bar||it.name)+'</span>';
        h+='</div>';
      }
    }
    h+='</div></div>';
  }
  document.getElementById('tlChart').innerHTML=h;
  closeDet();
}

window.navigate=function(dir){
  var windows=getWindows();
  wi=Math.max(0,Math.min(windows.length-1,wi+dir));
  render();
};
window.showDetail=function(i){
  var it=items[i],iS=dt(it.s),iE=dt(it.e);
  document.getElementById('detName').textContent=it.name;
  document.getElementById('detDates').textContent=iS.getTime()===iE.getTime()?fmt(iS):fmt(iS)+' – '+fmt(iE);
  var ex='';
  if(it.hours) ex+='<span>Hours: '+it.hours+'</span>';
  if(it.loc)   ex+='<span>Location: '+it.loc+'</span>';
  if(it.bring) ex+='<span>Bring: '+it.bring+'</span>';
  if(it.note)  ex+='<span style="font-style:italic;">'+it.note+'</span>';
  document.getElementById('detExtras').innerHTML=ex;
  var moreBtn=document.getElementById('detMoreBtn');
  var fullDiv=document.getElementById('detFull');
  if(it.fullnote){
    fullDiv.textContent=it.fullnote;
    fullDiv.style.display='none';
    moreBtn.textContent='More ▾';
    moreBtn.style.display='block';
  } else {
    moreBtn.style.display='none';
    fullDiv.style.display='none';
  }
  document.getElementById('detPanel').style.display='block';
};
window.toggleMore=function(){
  var fullDiv=document.getElementById('detFull');
  var moreBtn=document.getElementById('detMoreBtn');
  var show=fullDiv.style.display==='none';
  fullDiv.style.display=show?'block':'none';
  moreBtn.textContent=show?'Less ▴':'More ▾';
  moreBtn.style.background=show?'#e8e8e5':'#f0f0ee';
};
window.closeDet=function(){
  document.getElementById('detPanel').style.display='none';
};

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){
    var mob=isMobile();
    if(mob!==prevMob){syncWindowIndex(prevMob);prevMob=mob;}
    render();
  },100);
});

render();
})();

(function(){
  var c=document.createElement('canvas');
  c.width=c.height=180;
  var ctx=c.getContext('2d');

  // Ocean background — gradient from lighter teal-blue to mid blue
  var grad=ctx.createLinearGradient(0,0,0,180);
  grad.addColorStop(0,'#2B8FBF');
  grad.addColorStop(1,'#1A5F8A');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,180,180);
  // Water shimmer lines
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(0,90,180,2);ctx.fillRect(0,102,180,1.5);ctx.fillRect(0,112,180,1);

  function orca(cx,cy,s,dir){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(dir*s,s);
    // Body
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.ellipse(0,0,44,17,0,0,Math.PI*2);ctx.fill();
    // Dorsal fin
    ctx.beginPath();
    ctx.moveTo(-8,-17);ctx.bezierCurveTo(-5,-44,10,-44,15,-17);ctx.closePath();ctx.fill();
    // Tail flukes
    ctx.beginPath();
    ctx.moveTo(42,-2);ctx.bezierCurveTo(52,-8,62,-20,58,-22);
    ctx.bezierCurveTo(54,-24,48,-12,42,-2);
    ctx.bezierCurveTo(48,12,54,24,58,22);
    ctx.bezierCurveTo(62,20,52,8,42,-2);ctx.fill();
    // White belly
    ctx.fillStyle='white';
    ctx.beginPath();ctx.ellipse(8,9,27,9,0,0,Math.PI*2);ctx.fill();
    // White eye patch
    ctx.beginPath();ctx.ellipse(-20,-7,8,6,-0.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  orca(88,132,0.9,1);   // large, foreground
  orca(46,78,0.55,1);   // medium, upper left
  orca(142,58,0.38,-1); // small, upper right, facing left

  var l=document.createElement('link');
  l.rel='apple-touch-icon';
  l.href=c.toDataURL('image/png');
  document.head.appendChild(l);
})();
</script>
